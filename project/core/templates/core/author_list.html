<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authors</title>
</head>
<body>
    <h1>Authors</h1>

    <p>
        <a href="{% url 'author_create' %}">Create new author</a>
    </p>
    
    <ul>

        <!--Loops the list we sent from the view-->
        {% for author in authors %}
            <!--Shows last and first name-->
            <li>

                <!--Makes dynamic links, so everytime we click an author, we go to a specific details page-->
                <a href="{% url 'author_detail' author.id %}">
                    {{ author.last_name }} {{ author.first_name }}
                </a>
            </li>
        <!--If empty show the below li-->
        {% empty %}
            <li>No authors found</li>
        {% endfor %}    
    </ul>
</body>
</html>
