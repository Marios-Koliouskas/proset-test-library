<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Category</title>
</head>
<body>
    
    <h1>Categories</h1>

    <p>
        <a href="{% url 'category_create' %}">Create new category</a>
    </p>
    <ul>
        {% for category in categories %}
            <li>Name: <a href="{% url 'category_detail' category.id %}"> {{category.name}} </a>|| 
                Description: {{category.description}}
            </li>
        {%empty%}
            <li>No categories found</li>
        {%endfor%}
    </ul>
</body>
</html>
