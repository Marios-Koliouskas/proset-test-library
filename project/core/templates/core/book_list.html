<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Books</title>
</head>
<body>

    <h1>Books</h1>

    <ul>
        {% for book in books %}
        <li>Title: {{book.title}} || 
            Author: {{book.author}} || 
            Published: {{book.pub_date}} || 
            Price: {{book.price}} || 
            Category: {{book.category}} || 
        </li>
        {%empty%}
        <li>No books found</li>
        {%endfor%}
    </ul>
    
    
</body>
</html>
