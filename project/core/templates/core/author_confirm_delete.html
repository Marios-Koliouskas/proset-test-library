<!DOCTYPE html>
<html>
<head>
    <title>Delete Author</title>
</head>
<body>
    <h1>Delete Author</h1>

    <p>
        Are you sure you want to delete
        <strong>{{ author.last_name }} {{ author.first_name }}</strong>?
    </p>

    <form method="post">
        {% csrf_token %}

        <button type="submit">Yes, delete</button>
    </form>

    <p>
        <a href="{% url 'author_detail' author.id %}">Cancel</a>
    </p>
</body>
</html>
