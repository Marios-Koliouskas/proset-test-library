<!DOCTYPE html>
<html>
<head>
    <title>Delete Category</title>
</head>
<body>
    <h1>Delete Category</h1>

    <p>
        Are you sure you want to delete
        <strong>{{ category.name }}</strong>?
    </p>

    <form method="post">
        {% csrf_token %}

        <button type="submit">Yes, delete</button>
    </form>

    <p>
        <a href="{% url 'category_detail' category.id %}">Cancel</a>
    </p>
</body>
</html>
