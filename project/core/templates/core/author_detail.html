<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Author details</title>
</head>
<body>
    <h1>Author details</h1>
    <p><strong>ID:</strong> {{author.id}}</p>
    <p><strong>First name:</strong> {{author.first_name}}</p>
    <p><strong>Last name:</strong> {{author.last_name}}</p>
    <p><strong>Birth date:</strong> {{author.birth_date}}</p>
    <p><strong>Description:</strong> {{author.description}}</p>
    <p><strong>Created at:</strong> {{author.created_at}}</p>
    <p><strong>Updated at:</strong> {{author.updated_at}}</p>

    <p>
        <a href="{% url 'author_list' %}">Back to authors</a>
    </p>
</body>
</html>
